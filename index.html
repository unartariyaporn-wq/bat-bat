<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Bat Night Flight</title>

<style>

*{
    margin:0;
    padding:0;
}

body{
    overflow:hidden;
    height:100vh;

    background:linear-gradient(
        to bottom,
        #000000,
        #1a0000,
        #550000
    );
}

/* พระจันทร์ */

.moon{
    position:absolute;
    top:60px;
    right:100px;

    width:150px;
    height:150px;

    border-radius:50%;

    background:#fff7c2;

    box-shadow:
    0 0 30px #fff7c2,
    0 0 80px #fff7c2,
    0 0 120px #fff7c2;
}

/* หมอก */

.fog{
    position:absolute;
    width:200%;
    height:150px;

    background:rgba(255,255,255,.05);

    filter:blur(25px);

    animation:fogMove 20s linear infinite;
}

.fog1{
    top:180px;
}

.fog2{
    top:350px;
    animation-duration:35s;
}

@keyframes fogMove{

    from{
        transform:translateX(-50%);
    }

    to{
        transform:translateX(0%);
    }
}

/* ค้างคาว */

.bat{

    position:absolute;

    font-size:90px;

    filter:
    drop-shadow(0 0 10px black);

    animation:
    fly 12s linear infinite,
    flap .18s infinite;
}

@keyframes flap{

    0%,100%{
        transform:scaleY(1);
    }

    50%{
        transform:scaleY(.8);
    }
}

/* บินข้ามจอ */

@keyframes fly{

    0%{
        left:-150px;
        top:55%;
    }

    25%{
        top:35%;
    }

    50%{
        top:50%;
    }

    75%{
        top:30%;
    }

    100%{
        left:110%;
        top:45%;
    }
}

/* ดาว */

.star{
    position:absolute;
    color:white;
    font-size:12px;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{

    from{
        opacity:.2;
    }

    to{
        opacity:1;
    }
}

</style>

</head>

<body>

<div class="moon"></div>

<div class="fog fog1"></div>
<div class="fog fog2"></div>

<div class="star" style="top:100px;left:100px;">✦</div>
<div class="star" style="top:200px;left:250px;">✦</div>
<div class="star" style="top:150px;left:500px;">✦</div>
<div class="star" style="top:80px;left:800px;">✦</div>
<div class="star" style="top:250px;left:1200px;">✦</div>

<div class="bat">🦇</div>

</body>
</html>
