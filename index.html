<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Flight</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;

    background:
    radial-gradient(circle at top right,#552222 0%,#220000 35%,#000000 100%);
}

/* พระจันทร์ */

.moon{
    position:absolute;

    top:60px;
    right:120px;

    width:180px;
    height:180px;

    border-radius:50%;

    background:#fff7cc;

    box-shadow:
        0 0 40px #fff7cc,
        0 0 120px #fff7cc;
}

/* ดาว */

.star{
    position:absolute;
    color:white;
    opacity:.8;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{opacity:1;}
}

/* หมอก */

.fog{
    position:absolute;

    width:250%;
    height:160px;

    background:rgba(255,255,255,.05);

    filter:blur(30px);

    animation:fogMove 30s linear infinite;
}

.fog1{
    top:180px;
}

.fog2{
    top:380px;
    animation-duration:45s;
}

@keyframes fogMove{

    from{
        transform:translateX(-50%);
    }

    to{
        transform:translateX(0%);
    }
}

/* ค้างคาว */

.bat{

    position:absolute;

    width:260px;

    animation:
        flyAcross 14s linear infinite,
        float 2s ease-in-out infinite;
}

/* ปีก */

.leftWing{
    transform-origin:100% 50%;
    animation:leftWing .15s infinite ease-in-out;
}

.rightWing{
    transform-origin:0% 50%;
    animation:rightWing .15s infinite ease-in-out;
}

@keyframes leftWing{

    0%,100%{
        transform:rotate(0deg);
    }

    50%{
        transform:rotate(-45deg);
    }
}

@keyframes rightWing{

    0%,100%{
        transform:rotate(0deg);
    }

    50%{
        transform:rotate(45deg);
    }
}

/* บินผ่านจอ */
@keyframes flyAcross{

    0%{
        left:-300px;
        top:55%;
        transform:scale(.8);
    }

    30%{
        left:25%;
        top:35%;
        transform:scale(1);
    }

    /* ผ่านหน้าพระจันทร์ */
    50%{
        left:72%;
        top:13%;
        transform:scale(1.8);
    }

    70%{
        left:85%;
        top:22%;
        transform:scale(1.2);
    }

    100%{
        left:120%;
        top:45%;
        transform:scale(.6);
    }
}

/* ลอยขึ้นลง */

@keyframes float{

    0%,100%{
        margin-top:0;
    }

    50%{
        margin-top:-20px;
    }
}

.eye{
    fill:red;
    filter:drop-shadow(0 0 8px red);
}

</style>
</head>

<body>

<div class="moon"></div>

<div class="star" style="left:80px;top:70px;">✦</div>
<div class="star" style="left:250px;top:130px;">✦</div>
<div class="star" style="left:500px;top:80px;">✦</div>
<div class="star" style="left:850px;top:150px;">✦</div>
<div class="star" style="left:1200px;top:100px;">✦</div>

<div class="fog fog1"></div>
<div class="fog fog2"></div>

<svg class="bat" viewBox="0 0 500 250">

    <!-- ปีกซ้าย -->
    <g class="leftWing">
        <path d="
        M250 125
        Q180 40 60 90
        Q90 120 50 170
        Q120 140 170 180
        Q200 145 250 125"
        fill="#111"/>
    </g>

    <!-- ปีกขวา -->
    <g class="rightWing">
        <path d="
        M250 125
        Q320 40 440 90
        Q410 120 450 170
        Q380 140 330 180
        Q300 145 250 125"
        fill="#111"/>
    </g>

    <!-- ตัว -->
    <ellipse cx="250" cy="130" rx="22" ry="50" fill="#111"/>

    <!-- หัว -->
    <circle cx="250" cy="85" r="22" fill="#111"/>

    <!-- หู -->
    <polygon points="235,65 242,35 248,65" fill="#111"/>
    <polygon points="265,65 258,35 252,65" fill="#111"/>

    <!-- ตา -->
    <circle class="eye" cx="243" cy="83" r="2"/>
    <circle class="eye" cx="257" cy="83" r="2"/>

</svg>

</body>
</html>
